<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2196f3">
<title>国旗クイズ/FLAG QUIZ</title>

<style>
/* ==== 全体背景 ==== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#4e73df,#1cc88a);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* ===== 共通カード（ホーム＆ゲーム） ===== */
.app,
#homeScreen{
  background:white;
  width:95%;
  max-width:420px;
  padding:25px;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  text-align:center;
  animation:fadeIn .3s ease;
}
#homeScreen h1{
  font-size:22px;
}

/* ===== フェードアニメーション ===== */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== タイトル ===== */
h1{
  margin-bottom:20px;
}

/* ===== 上部バー ===== */
.topbar{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-bottom:4px;
}

.timer{
  color:#e74a3b;
  font-weight:bold;
}

/* ===== 国旗 ===== */
#flag{
  width:100%;
  max-width:280px;
  height:180px;
  object-fit:contain;
  margin:15px 0;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  background:white;
}

/* ===== 入力欄 ===== */
input{
  width:90%;
  padding:10px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #ddd;
  margin:6px 0;
}

/* ===== セレクト ===== */
select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-bottom:15px;
  font-size:14px;
}

/* ===== ボタン共通 ===== */
button{
  width:100%;
  padding:10px;
  font-size:15px;
  border:none;
  border-radius:14px;
  background:#4e73df;
  color:white;
  margin-top:6px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

/* ===== ボタン色分け ===== */
button.skip{
  background:#858796;
}

button.pause{
  background:#e74a3b;
}

button.review{
  background:#f6c23e;
  color:black;
}

/* ===== 結果表示 ===== */
.result,
#result{
  font-size:16px;
  min-height:35px;
  margin-top:8px;
  font-weight:bold;
}

/* ===== 正答率 ===== */
#accuracy{
  font-weight:bold;
}

/* ===== ホーム専用ボタン強調 ===== */
#homeScreen button{
  font-size:16px;
  padding:14px;
}
/* ===== 追加強調 ===== */
#modeTitle{
  font-size:18px;
  font-weight:700;
  margin:10px 0 5px 0;
  padding:6px 12px;
  display:inline-block;
  background:linear-gradient(90deg,#4e73df,#1cc88a);
  color:white;
  border-radius:20px;
  letter-spacing:1px;
}
.app{
  background:white;
  width:95%;
  max-width:420px;
  padding:20px;
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  text-align:center;
  
}

.timeResultBox{
  margin-top:15px;
  padding:12px;
  border-radius:15px;
  background:linear-gradient(135deg,#fff3cd,#ffe8a1);
  box-shadow:0 8px 15px rgba(0,0,0,0.15);
  font-size:14px;
}
.rankS{ color:gold; font-weight:bold; }
.rankA{ color:#28a745; }
.rankB{ color:#007bff; }
.rankC{ color:#6c757d; }
.newRecord{
  animation:pop 0.6s ease;
}
@keyframes pop{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
.comboGlow{
  animation:glow 0.5s ease-in-out;
}

@keyframes glow{
  0%{text-shadow:none;}
  50%{text-shadow:0 0 10px gold;}
  100%{text-shadow:none;}
}

.comboBg{
  animation:bgFlash 0.5s;
}

@keyframes bgFlash{
  0%{background:linear-gradient(135deg,#4e73df,#1cc88a);}
  50%{background:linear-gradient(135deg,#ff512f,#dd2476);}
  100%{background:linear-gradient(135deg,#4e73df,#1cc88a);}
}
#homeScreen{
  display:flex;
  flex-direction:column;
  gap:10px;
}




</style>
</head>
<body>

<!-- 🏠 ホーム面 -->
<div id="homeScreen">
<h1>🌍 FLAG QUIZ<BR>-世界196カ国 国旗クイズ-</h1>

<select id="continentSelect" onchange="changeContinent()">
<option value="all">全世界/all</option>
<option value="asia">アジア/Asia</option>
<option value="europe">ヨーロッパ/Europe</option>
<option value="africa">アフリカ/Africa</option>
<option value="northamerica">北米/North America</option>
<option value="southamerica">南米/South America</option>
<option value="oceania">オセアニア/Oceania</option>
</select>


  <button onclick="startNormal()">▶ 通常モード/Normal mode</button>
  <button onclick="startContinent()">🌎 大陸別モード/Continent mode</button>
  <button onclick="startReview()">🔁 復習モード/Review mode</button>
  <button onclick="startTimeAttack()">🏆 1分チャレンジ/1-minute challenge</button>

<div id="timeAttackResult" class="timeResultBox">
  <h3>🏆 1分チャレンジ記録/1-minute challenge record</h3>
  <p>最高スコア/High score: <span id="taHighScore">0</span></p>
  <p>ランク/Rank: <span id="taRank">-</span></p>
  <p>順位: <span id="taRanking">-</span></p>
</div>
</div>
<!-- 🎮 ゲーム画面 -->
<div id="gameScreen" style="display:none;">
<div class="app">
<div class="topbar">
<div>Score:<span id="score">0</span></div>
<div>🏆:<span id="highScore">0</span></div>
<div>Continue:<span id="combo">0</span></div>
<div>Review:<span id="reviewCount">0</span></div>
<div class="timer">⏱<span id="time">10</span></div>
</div>
  <button onclick="goHome()">← ホームに戻る/Back to Home</button>
  <h2 id="modeTitle"></h2>
  <div>正答率/Accuracy rate: <span id="accuracy">0</span>%</div>
  <img id="flag" width="300">
  <p id="result"></p>
  <input type="text" id="answer" placeholder="国名を入力/country name here">
  <button onclick="checkAnswer()">答える/Answer</button>
  <button class="skip" onclick="skipQuestion()">次へ/Skip</button>
  <button class="pause" onclick="togglePause()">⏸停止Stop/再開Start</button>

</div></div>

<script src="main.js"></script>
